name: Setup Node and npm
description: Setup Node and pin npm from package.json packageManager

inputs:
  node-version:
    description: Node.js version passed to actions/setup-node
    default: "24"

runs:
  using: composite
  steps:
    - name: Set up Node
      uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
      with:
        node-version: ${{ inputs.node-version }}

    - name: Pin npm
      shell: bash
      run: node scripts/ensure-npm-version.cjs
